<!DOCTYPE html>
<html>
<head>
    <title>My To-Do List</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 50px auto; background: #f4f4f4; }
        h1 { text-align: center; color: #333; }
        form { display: flex; margin-bottom: 20px; }
        input[type=text] { flex: 1; padding: 10px; }
        button { padding: 10px 15px; background: #28a745; color: white; border: none; cursor: pointer; }
        ul { list-style: none; padding: 0; }
        li { background: white; margin: 8px 0; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; }
        .done { text-decoration: line-through; color: gray; }
        .task-text { flex: 1; cursor: pointer; }
        .actions a { margin-left: 10px; text-decoration: none; font-size: 14px; }
        .delete-link { color: red; }
        .complete-link { color: green; }
    </style>
</head>
<body>
    <h1>My To-Do List</h1>
    <form action="/add" method="POST">
        <input type="text" name="task" placeholder="Add a new task..." required>
        <button type="submit">Add</button>
    </form>
    <ul>
        {% for task in tasks %}
        <li>
            <span class="task-text {% if task.done %}done{% endif %}">
                {{ task.name }}
            </span>
            <span class="actions">
                <a class="complete-link" href="/complete/{{ loop.index0 }}">
                    {% if task.done %}Undo{% else %}Done{% endif %}
                </a>
                <a class="delete-link" href="/delete/{{ loop.index0 }}">Delete</a>
            </span>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
